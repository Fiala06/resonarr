<!-- @dsCard group="Components" name="Track row" subtitle="Title + artist/album, optional seed state" -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        background: #0f1115;
        color: #e8e8ea;
        font-family: system-ui, -apple-system, sans-serif;
        padding: 24px;
        max-width: 520px;
      }
      .stack { display: grid; gap: 8px; }
      .row {
        display: flex; align-items: center; gap: 10px;
        padding: 8px 10px; border-radius: 6px;
        background: #1a1d24; border: 1px solid #2a2e37;
      }
      .seed { background: rgba(124,92,255,0.12); border: 1px solid #7c5cff; }
      .title { font-size: 15px; }
      .sub { color: #9aa0a6; font-size: 13px; }
      .eyebrow { color: #9aa0a6; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="stack">
      <div class="row seed">
        <div>
          <div class="eyebrow">Seed</div>
          <div class="title">Kryptonite — 3 Doors Down</div>
        </div>
      </div>
      <div class="row">
        <div style="flex:1">
          <div class="title">Garden</div>
          <div class="sub">Pearl Jam — Ten</div>
        </div>
      </div>
      <div class="row">
        <div style="flex:1">
          <div class="title">The Razors Edge</div>
          <div class="sub">AC/DC — The Razors Edge</div>
        </div>
      </div>
    </div>
  </body>
</html>
