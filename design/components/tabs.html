<!-- @dsCard group="Components" name="Tab bar" subtitle="Primary navigation" -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        background: #0f1115;
        font-family: system-ui, -apple-system, sans-serif;
        padding: 28px;
      }
      nav { display: flex; gap: 6px; }
      .tab { border-radius: 6px; padding: 6px 14px; font-size: 15px; cursor: pointer; }
      .active { background: #1a1d24; color: #e8e8ea; border: 1px solid #2a2e37; }
      .idle { background: transparent; color: #9aa0a6; border: 1px solid transparent; }
    </style>
  </head>
  <body>
    <nav>
      <div class="tab active">Sonic Sage</div>
      <div class="tab idle">Radio</div>
      <div class="tab idle">Mixes</div>
      <div class="tab idle">Adventure</div>
      <div class="tab idle">Basket</div>
    </nav>
  </body>
</html>
