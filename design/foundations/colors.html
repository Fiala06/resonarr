<!-- @dsCard group="Foundations" name="Colors" subtitle="Core dark palette" -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        background: #0f1115;
        color: #e8e8ea;
        font-family: system-ui, -apple-system, sans-serif;
        padding: 24px;
      }
      .grid { display: flex; gap: 14px; flex-wrap: wrap; }
      .sw { width: 116px; }
      .chip { height: 56px; border-radius: 8px; border: 1px solid #2a2e37; }
      .name { margin-top: 8px; font-size: 13px; }
      .hex { color: #9aa0a6; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="sw"><div class="chip" style="background:#0f1115"></div><div class="name">bg</div><div class="hex">#0f1115</div></div>
      <div class="sw"><div class="chip" style="background:#1a1d24"></div><div class="name">panel</div><div class="hex">#1a1d24</div></div>
      <div class="sw"><div class="chip" style="background:#2a2e37"></div><div class="name">border</div><div class="hex">#2a2e37</div></div>
      <div class="sw"><div class="chip" style="background:#7c5cff"></div><div class="name">accent</div><div class="hex">#7c5cff</div></div>
      <div class="sw"><div class="chip" style="background:#51cf66"></div><div class="name">green</div><div class="hex">#51cf66</div></div>
      <div class="sw"><div class="chip" style="background:#ff6b6b"></div><div class="name">red</div><div class="hex">#ff6b6b</div></div>
      <div class="sw"><div class="chip" style="background:#e8e8ea"></div><div class="name">text</div><div class="hex">#e8e8ea</div></div>
      <div class="sw"><div class="chip" style="background:#9aa0a6"></div><div class="name">muted</div><div class="hex">#9aa0a6</div></div>
    </div>
  </body>
</html>
