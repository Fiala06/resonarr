# Dev / self-host convenience. On Unraid these map to the container template.
services:
  resonarr:
    build:
      context: .
      args:
        # Commit stamp for the GUI version line. Left empty by default so the
        # Dockerfile auto-detects it from .git; override explicitly if you build
        # from a non-git source:  GIT_SHA=abc1234 docker compose up -d --build
        GIT_SHA: ${GIT_SHA:-}
    container_name: resonarr
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      # Persists the SQLite DB + non-secret settings (Phase 1+).
      - ./config:/config
    restart: unless-stopped
