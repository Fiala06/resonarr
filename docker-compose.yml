# Dev / self-host convenience. On Unraid these map to the container template.
services:
  resonarr:
    build:
      context: .
      args:
        # Stamp the image with the commit it was built from so the GUI can show
        # it. Build with:  GIT_SHA=$(git rev-parse --short HEAD) docker compose up -d --build
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: resonarr
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      # Persists the SQLite DB + non-secret settings (Phase 1+).
      - ./config:/config
    restart: unless-stopped
